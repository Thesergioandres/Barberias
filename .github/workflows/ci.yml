name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Deploy backend (Railway)
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "$RAILWAY_BACKEND_DEPLOY_HOOK" ]; then
            curl -X POST "$RAILWAY_BACKEND_DEPLOY_HOOK"
          else
            echo "RAILWAY_BACKEND_DEPLOY_HOOK not set; skipping deploy."
          fi
        env:
          RAILWAY_BACKEND_DEPLOY_HOOK: ${{ secrets.RAILWAY_BACKEND_DEPLOY_HOOK }}

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Deploy frontend (Railway)
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "$RAILWAY_FRONTEND_DEPLOY_HOOK" ]; then
            curl -X POST "$RAILWAY_FRONTEND_DEPLOY_HOOK"
          else
            echo "RAILWAY_FRONTEND_DEPLOY_HOOK not set; skipping deploy."
          fi
        env:
          RAILWAY_FRONTEND_DEPLOY_HOOK: ${{ secrets.RAILWAY_FRONTEND_DEPLOY_HOOK }}
