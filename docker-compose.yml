services:
  app:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=http://localhost/api

  backend:
    build:
      context: ./backend
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/barberia
      - REDIS_URL=redis://redis:6379
      - ENABLE_JOBS=true
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-mock}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET es obligatorio. Copia .env.example como .env y define un secreto seguro}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    depends_on:
      - mongo
      - redis
    ports:
      - "4000:4000"

  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  mongo-express:
    image: mongo-express:1.0.2
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
    depends_on:
      - mongo

volumes:
  mongo_data:
